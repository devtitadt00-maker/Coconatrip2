<!--
  TEMPLATE: Google Site Verification HTML
  --------------------------------------
  Google Search Console provides a verification file named like "googleXXXXXXXXXXXX.html".
  1) When Google gives you the verification filename (e.g. google1234567890abcdef.html),
     rename this file to that exact filename.
  2) Edit the single line below (the token) if Google gave a specific file content (optional).
  3) Deploy to your site root (https://your-domain.com/google1234567890abcdef.html) and then
     click "VERIFY" in Google Search Console.

  Note: Alternatively you can use meta tag verification. After verification you may remove this file.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Google Site Verification (template)</title>
  </head>
  <body>
    <!-- Replace the placeholder below with the exact string/content Google instructs (if any). -->
    google-site-verification: PLACE-YOUR-VERIFICATION-TOKEN-HERE
  </body>
</html>
